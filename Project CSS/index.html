<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="./Assets/logo.png">
    <title>Spotify - Web Player: Music for everyone </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="sidebar">
            <div class="nav">
                <div class="nav-option" style="opacity:1">
                <i class="fas fa-home" style="color: rgb(234, 232, 242);"></i>                
                <a href="#">Home</a>
                </div>
                <div class="nav-option" >
                   <i class="fa-solid fa-magnifying-glass" style="color: rgb(241, 238, 250);"></i>
                    <a href="#">Search</a>
                </div>
            </div>
            <div class="library">
                <div class="options">
                    <div class="lib-option nav-option">
                        <img src="./Assets/library_icon.png" alt="icon">
                        <a href="#">Your Library </a>
                    </div>
                    <div class="iconsLib">
                        <i class="fa-solid fa-plus" style="color: rgb(241, 238, 250);"></i>
                        <i class="fa-solid fa-arrow-right-long" style="color: rgb(241, 238, 250);"></i>
                    </div>
                </div>
                <div class="lib-box">
                    <div class="box">
                        <p class="box-p1">
                            Create your first playlist.
                        </p>
                        <p class="box-p2">
                            It's easy, we'll help you.
                        </p>
                        <button class="badge">
                            Create Playlist 
                        </button>
                    </div>
                    <div class="box">
                        <p class="box-p1">
                           Let's find some podcasts to follow
                        </p>
                        <p class="box-p2">
                            We'll keep you updated on new episodes
                        </p>
                        <button class="badge">
                            Browse Poadcast
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="main-content">
            <!-- main content -->
             <div class="sticky-nav">
                <div class="sticky-nav-icons">
                    <img src="./Assets/backward_icon.png" alt="">
                    <img src="./Assets/forward_icon.png" class="hide">
                </div>
                <div class="sticky-nav-options">
                    <button class="badge nav-item hide"> Explore Premium </button>
                    <button class="badge nav-item dark-badge">
                        <i class="fa-solid fa-circle-down  " style="color: rgb(233, 231, 237);"></i>                         
                        Install App
                     </button>
                    <i class="fa-regular fa-user nav-item"  style="color: rgb(241, 238, 250);"></i>          
                </div>
            </div>
             <div class="cards"></div>
         </div>
        <div class="music-player">Music Player </div>
    </div>
</body>
</html>

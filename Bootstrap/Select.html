 Forms -
    Form controls 
    select 
    
-->
  <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
     <link href="   https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="./useBootStrap.css">
 </head>
 <body>
    <div class="container">
        <h2>Form Demo</h2>
        <form action="" class="mb-3">
            <label class="form-label" for="Email">Email</label>
            <input class="form-control" type="text" name="Email" id="Email" placeholder="Enter Your Email">

            <label for="password" class="form-label">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter Your Password"
            class="form-control">

            <label for="Address" class="form-label">Address</label>
            <br>
            <input type="text" name="Address" id="Address" placeholder="Enter Your Address"
            class="form-control">
            
            <div class="m-3">
            <select class="form-select"
            name="" id="">
            <option selected value="Select Someting">Select Someting</option>
            <option value="1">One</option>
            <option value="2">Two</option>
            <option value="3">Three</option>
            </select>

            <br>
            <h4>Select cities </h4>
            <div class="m-3">
            <select class="form-select"
            name="" id="">
            <option selected value="Select city">Select city</option>
            <option value="Mumbai"> Mumbai</option>
            <option value="Delhi">Delhi</option>
            <option value="Kolkata"> Kolkata </option>
            </select>
    
    
        </div>            
        </form>
    </div>
    
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">

    </script>
 </body>
 </html>

 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
     <link href="   https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="./useBootStrap.css">
 </head>
 <body>
    <div class="container">
        <h2>Form Demo</h2>
        <form action="" class="mb-3">
            <div class="row">
                 <div class="mb-3 col-md-6">
                <label class="form-label" for="Email">Email</label>
                <input class="form-control" type="text" name="Email" id="Email" placeholder="Enter Your Email">

            </div>
                 <div class="mb-3 col-md-6">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter Your Password"
            class="form-control">
            </div>
            </div>
           
          
          

            <label for="Address" class="form-label">Address</label>
            <br>
            <input type="text" name="Address" id="Address" placeholder="Enter Your Address"
            class="form-control">
        
            <br>
            <h4>Select cities </h4>
            <div class="m-3">
            <select class="form-select"
            name="" id="">
            <option selected value="Select city">Select city</option>
            <option value="Mumbai"> Mumbai</option>
            <option value="Delhi">Delhi</option>
            <option value="Kolkata"> Kolkata </option>
            </select>
    
            <h4 class="m-4">Check box</h4>
            <div class="normal  m-3">
                <input type="checkbox" name="Agree" id="Agree">
                <label for="Agree">Agree</label>
                
            </div>
            
            <div class="form-check  m-3">
                <label for="Agreebs" class="form-check-label">Agree</label>
                <input type="checkbox" name="Agreebs" id="Agree" class="form-check-input">
                
            </div>
            <h4 class="m-4">Radio button </h4>
            <div class="form-check  m-3">
                <label for="Agreeradiobs" class="form-check-label">have you checked privacy policy are you Agree with it ?</label>
                <input type="radio" name="Agreeradiobs" id="Agree" class="form-check-input">

            </div>

            <h4>Form Switch</h4>
            <div class="form-check form-switch">
                <input type="checkbox" class="form-check-input" role="switch" id="flexswitchcheckdefault"
                >
                <label for="flexswitchcheckdefault" class="form-check-lable">
                    default switch checkbox input
                </label>

            </div>
        </div>            
        </form>
    </div>
    
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">

    </script>
 </body>
 </html>
